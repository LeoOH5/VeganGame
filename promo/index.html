<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
        color: #fff;
      }

      #root { position: relative; width: 1920px; height: 1080px; }

      .clip { position: absolute; }

      /* Scene 1: Vegan Hook */
      .vegan-text {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 320px;
        font-weight: 900;
        color: #7ecf7e;
        letter-spacing: -8px;
        text-shadow: 0 0 60px rgba(126, 207, 126, 0.5);
      }
      .red-x {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 600px;
        font-weight: 900;
        color: #ff2222;
        text-shadow: 0 0 80px rgba(255, 34, 34, 0.8);
      }
      .scene1-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: radial-gradient(circle at center, #1a2a1a 0%, #0a0a0f 70%);
      }

      /* Scene 2: Title */
      .title-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: radial-gradient(circle at center, #2a1a0a 0%, #0a0a0f 70%);
      }
      .title-emoji {
        top: 30%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 280px;
      }
      .title-main {
        top: 58%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 220px;
        font-weight: 900;
        background: linear-gradient(135deg, #ff6b35, #f7c948, #ff6b35);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -6px;
        white-space: nowrap;
      }
      .title-sub {
        top: 78%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 56px;
        color: #f7c948;
        font-weight: 600;
        letter-spacing: 8px;
        text-transform: uppercase;
      }

      /* Scene 3: Gameplay */
      .gameplay-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: linear-gradient(180deg, #1a1a2a 0%, #0a0a0f 100%);
      }
      .gameplay-label {
        top: 80px; left: 50%;
        transform: translateX(-50%);
        font-size: 64px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 4px;
      }
      .falling-item {
        font-size: 180px;
        top: -200px;
        filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.6));
      }
      .falling-veg { filter: drop-shadow(0 0 30px rgba(126, 207, 126, 0.6)); }

      .mouth-circle {
        bottom: 120px; left: 50%;
        transform: translateX(-50%);
        width: 280px; height: 280px;
        border: 8px solid rgba(255, 220, 50, 0.9);
        border-radius: 50%;
        box-shadow: 0 0 60px rgba(255, 220, 50, 0.6), inset 0 0 40px rgba(255, 220, 50, 0.2);
      }
      .mouth-label {
        bottom: 60px; left: 50%;
        transform: translateX(-50%);
        font-size: 36px;
        color: #f7c948;
        font-weight: 700;
        letter-spacing: 4px;
      }

      /* Scene 4: Effects */
      .fx-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: #0a0a0f;
      }
      .red-flash {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: rgba(200, 0, 0, 0.55);
      }
      .novegan-text {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 280px;
        font-weight: 900;
        background: linear-gradient(180deg, #ff2222 0%, #ff8c00 50%, #ff2222 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        -webkit-text-stroke: 6px rgba(80, 0, 0, 0.9);
        letter-spacing: -8px;
      }
      .gold-glow {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: radial-gradient(circle at center,
                    rgba(255, 200, 50, 0) 0%,
                    rgba(255, 140, 0, 0.35) 60%,
                    rgba(255, 200, 50, 0.7) 100%);
      }
      .heart {
        font-size: 140px;
        filter: drop-shadow(0 0 30px rgba(255, 100, 50, 0.8));
      }
      .meat-showcase {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 360px;
        filter: drop-shadow(0 0 80px rgba(255, 107, 53, 0.9));
      }

      /* Scene 5: AI Tech */
      .tech-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: linear-gradient(135deg, #0a1530 0%, #0a0a0f 100%);
      }
      .tech-grid {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background-image:
          linear-gradient(rgba(0, 200, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 200, 255, 0.08) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .tech-icon {
        top: 35%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 240px;
        filter: drop-shadow(0 0 50px rgba(0, 200, 255, 0.8));
      }
      .tech-title {
        top: 62%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 110px;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 40px rgba(0, 200, 255, 0.6);
        white-space: nowrap;
      }
      .tech-sub {
        top: 76%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
        color: #00c8ff;
        font-weight: 500;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      /* Scene 6: CTA */
      .cta-bg {
        top: 0; left: 0; width: 1920px; height: 1080px;
        background: radial-gradient(circle at center, #2a1a0a 0%, #0a0a0f 80%);
      }
      .cta-title {
        top: 30%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 180px;
        font-weight: 900;
        background: linear-gradient(135deg, #ff6b35, #f7c948);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -4px;
        white-space: nowrap;
      }
      .cta-button {
        top: 55%; left: 50%;
        transform: translate(-50%, -50%);
        padding: 50px 140px;
        background: linear-gradient(135deg, #ff6b35, #f7c948);
        color: #000;
        font-size: 96px;
        font-weight: 900;
        border-radius: 100px;
        letter-spacing: 4px;
        white-space: nowrap;
        box-shadow: 0 20px 80px rgba(255, 107, 53, 0.5);
      }
      .cta-url {
        top: 78%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 64px;
        color: #f7c948;
        font-weight: 600;
        letter-spacing: 6px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >

      <!-- ═══ SCENE 1: HOOK (0-2s) ═══ -->
      <div id="s1-bg" class="clip scene1-bg" data-start="0" data-duration="2" data-track-index="0"></div>
      <div id="s1-vegan" class="clip vegan-text" data-start="0" data-duration="2" data-track-index="1">VEGAN?</div>
      <div id="s1-x" class="clip red-x" data-start="1" data-duration="1" data-track-index="2">✕</div>

      <!-- ═══ SCENE 2: TITLE (2-4.5s) ═══ -->
      <div id="s2-bg" class="clip title-bg" data-start="2" data-duration="2.5" data-track-index="0"></div>
      <div id="s2-emoji" class="clip title-emoji" data-start="2" data-duration="2.5" data-track-index="1">🥩</div>
      <div id="s2-main" class="clip title-main" data-start="2.2" data-duration="2.3" data-track-index="2">No-Vegan Game</div>
      <div id="s2-sub" class="clip title-sub" data-start="2.8" data-duration="1.7" data-track-index="3">Eat Meat. Avoid Veggies.</div>

      <!-- ═══ SCENE 3: GAMEPLAY (4.5-8s) ═══ -->
      <div id="s3-bg" class="clip gameplay-bg" data-start="4.5" data-duration="3.5" data-track-index="0"></div>
      <div id="s3-label" class="clip gameplay-label" data-start="4.5" data-duration="3.5" data-track-index="1">CATCH WITH YOUR MOUTH</div>

      <div id="s3-meat1" class="clip falling-item" data-start="4.7" data-duration="2.5" data-track-index="2" style="left: 18%;">🥩</div>
      <div id="s3-veg1" class="clip falling-item falling-veg" data-start="5.0" data-duration="2.5" data-track-index="3" style="left: 38%;">🥦</div>
      <div id="s3-meat2" class="clip falling-item" data-start="5.3" data-duration="2.5" data-track-index="4" style="left: 58%;">🍗</div>
      <div id="s3-veg2" class="clip falling-item falling-veg" data-start="5.6" data-duration="2.5" data-track-index="5" style="left: 78%;">🥕</div>
      <div id="s3-meat3" class="clip falling-item" data-start="5.9" data-duration="2.5" data-track-index="6" style="left: 28%;">🥓</div>
      <div id="s3-meat4" class="clip falling-item" data-start="6.2" data-duration="2.5" data-track-index="7" style="left: 68%;">🍖</div>

      <div id="s3-mouth" class="clip mouth-circle" data-start="4.7" data-duration="3.3" data-track-index="8"></div>
      <div id="s3-mouthlabel" class="clip mouth-label" data-start="4.7" data-duration="3.3" data-track-index="9">AI MOUTH TRACKING</div>

      <!-- ═══ SCENE 4: EFFECTS (8-11s) ═══ -->
      <div id="s4-bg" class="clip fx-bg" data-start="8" data-duration="3" data-track-index="0"></div>

      <!-- Veg hit (8-9.5s) -->
      <div id="s4-flash" class="clip red-flash" data-start="8" data-duration="0.7" data-track-index="1"></div>
      <div id="s4-novegan" class="clip novegan-text" data-start="8" data-duration="1.5" data-track-index="2">No Vegan!</div>

      <!-- Meat hit (9.5-11s) -->
      <div id="s4-meat" class="clip meat-showcase" data-start="9.5" data-duration="1.5" data-track-index="3">🥩</div>
      <div id="s4-glow" class="clip gold-glow" data-start="9.5" data-duration="1.5" data-track-index="4"></div>
      <div id="s4-heart1" class="clip heart" data-start="9.7" data-duration="1.3" data-track-index="5" style="left: 25%; top: 65%;">❤️</div>
      <div id="s4-heart2" class="clip heart" data-start="9.9" data-duration="1.3" data-track-index="6" style="left: 50%; top: 65%;">❤️</div>
      <div id="s4-heart3" class="clip heart" data-start="10.1" data-duration="1.3" data-track-index="7" style="left: 75%; top: 65%;">❤️</div>

      <!-- ═══ SCENE 5: AI TECH (11-13s) ═══ -->
      <div id="s5-bg" class="clip tech-bg" data-start="11" data-duration="2" data-track-index="0"></div>
      <div id="s5-grid" class="clip tech-grid" data-start="11" data-duration="2" data-track-index="1"></div>
      <div id="s5-icon" class="clip tech-icon" data-start="11" data-duration="2" data-track-index="2">🤖</div>
      <div id="s5-title" class="clip tech-title" data-start="11.2" data-duration="1.8" data-track-index="3">AI Face Tracking</div>
      <div id="s5-sub" class="clip tech-sub" data-start="11.5" data-duration="1.5" data-track-index="4">Powered by MediaPipe</div>

      <!-- ═══ SCENE 6: CTA (13-15s) ═══ -->
      <div id="s6-bg" class="clip cta-bg" data-start="13" data-duration="2" data-track-index="0"></div>
      <div id="s6-title" class="clip cta-title" data-start="13" data-duration="2" data-track-index="1">Are You Ready?</div>
      <div id="s6-button" class="clip cta-button" data-start="13.3" data-duration="1.7" data-track-index="2">PLAY NOW</div>
      <div id="s6-url" class="clip cta-url" data-start="13.6" data-duration="1.4" data-track-index="3">no-vegan.vercel.app</div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ─── SCENE 1: HOOK ─────────────────────────────────────────
      tl.from("#s1-bg", { opacity: 0, duration: 0.3 }, 0);
      tl.from("#s1-vegan", { scale: 0.3, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 0);
      tl.to("#s1-vegan", { scale: 1.1, duration: 0.5, ease: "power2.in" }, 0.5);
      tl.to("#s1-vegan", { scale: 0, opacity: 0, rotation: -15, duration: 0.4, ease: "power3.in" }, 1);
      tl.fromTo("#s1-x",
        { scale: 0, rotation: -45, opacity: 0 },
        { scale: 1, rotation: 0, opacity: 1, duration: 0.4, ease: "back.out(3)" }, 1);
      tl.to("#s1-x", { scale: 1.3, opacity: 0, duration: 0.4, ease: "power2.in" }, 1.6);
      tl.set("#s1-x", { opacity: 0 }, 2.0);

      // ─── SCENE 2: TITLE ────────────────────────────────────────
      tl.from("#s2-bg", { opacity: 0, duration: 0.3 }, 2);
      tl.from("#s2-emoji",
        { scale: 0, rotation: -180, opacity: 0, duration: 0.7, ease: "back.out(2.5)" }, 2);
      tl.to("#s2-emoji",
        { y: -10, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 2 }, 2.7);
      tl.from("#s2-main",
        { scale: 0.5, opacity: 0, y: 80, duration: 0.6, ease: "back.out(1.7)" }, 2.4);
      tl.from("#s2-sub",
        { opacity: 0, y: 30, duration: 0.5, ease: "power2.out" }, 3);
      tl.to(["#s2-emoji","#s2-main","#s2-sub","#s2-bg"],
        { opacity: 0, duration: 0.3, ease: "power2.in" }, 4.2);

      // ─── SCENE 3: GAMEPLAY ─────────────────────────────────────
      tl.from("#s3-bg", { opacity: 0, duration: 0.3 }, 4.5);
      tl.from("#s3-label",
        { opacity: 0, y: -30, duration: 0.4, ease: "power2.out" }, 4.5);

      // Falling items animate from top to mouth area
      const falling = ["#s3-meat1","#s3-veg1","#s3-meat2","#s3-veg2","#s3-meat3","#s3-meat4"];
      falling.forEach((sel, i) => {
        const startTime = 4.7 + i * 0.3;
        tl.fromTo(sel,
          { y: 0, rotation: 0, opacity: 0 },
          { y: 760, rotation: 360, opacity: 1, duration: 1.6, ease: "power1.in" },
          startTime);
        tl.to(sel,
          { scale: 1.4, opacity: 0, duration: 0.25, ease: "back.in(2)" },
          startTime + 1.6);
      });

      tl.from("#s3-mouth",
        { scale: 0, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 4.7);
      tl.to("#s3-mouth",
        { scale: 1.1, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 4 }, 5.2);
      tl.from("#s3-mouthlabel",
        { opacity: 0, y: 20, duration: 0.4 }, 4.9);

      tl.to(["#s3-bg","#s3-label","#s3-mouth","#s3-mouthlabel"],
        { opacity: 0, duration: 0.3 }, 7.7);

      // ─── SCENE 4: EFFECTS ──────────────────────────────────────
      tl.from("#s4-bg", { opacity: 0, duration: 0.2 }, 8);

      // Veg hit: red flash + No Vegan text shake
      tl.fromTo("#s4-flash",
        { opacity: 0 },
        { opacity: 1, duration: 0.1, ease: "power2.out" }, 8);
      tl.to("#s4-flash",
        { opacity: 0, duration: 0.6, ease: "power2.in" }, 8.1);

      tl.fromTo("#s4-novegan",
        { scale: 1.6, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" }, 8);
      tl.to("#s4-novegan",
        { x: "+=15", duration: 0.05, repeat: 8, yoyo: true }, 8.4);
      tl.to("#s4-novegan",
        { opacity: 0, scale: 0.8, duration: 0.4, ease: "power2.in" }, 9.1);
      tl.set("#s4-novegan", { opacity: 0 }, 9.5);

      // Meat hit: glow + meat reveal + hearts
      tl.fromTo("#s4-meat",
        { scale: 0, rotation: -180, opacity: 0 },
        { scale: 1, rotation: 0, opacity: 1, duration: 0.6, ease: "back.out(2)" }, 9.5);
      tl.fromTo("#s4-glow",
        { opacity: 0 },
        { opacity: 1, duration: 0.5, ease: "power2.out" }, 9.5);
      tl.to(["#s4-glow","#s4-meat"],
        { opacity: 0, duration: 0.4, ease: "power2.in" }, 10.6);

      ["#s4-heart1","#s4-heart2","#s4-heart3"].forEach((sel, i) => {
        tl.fromTo(sel,
          { y: 80, opacity: 0, scale: 0.5 },
          { y: -200, opacity: 1, scale: 1.2, duration: 1, ease: "power1.out" },
          9.7 + i * 0.2);
        tl.to(sel,
          { opacity: 0, duration: 0.3 },
          10.5 + i * 0.2);
      });

      tl.to("#s4-bg", { opacity: 0, duration: 0.3 }, 10.7);
      tl.set("#s4-bg", { opacity: 0 }, 11.0);

      // ─── SCENE 5: AI TECH ──────────────────────────────────────
      tl.from("#s5-bg", { opacity: 0, duration: 0.3 }, 11);
      tl.from("#s5-grid", { opacity: 0, duration: 0.5 }, 11);
      tl.from("#s5-icon",
        { scale: 0, rotation: 360, opacity: 0, duration: 0.7, ease: "back.out(2)" }, 11);
      tl.from("#s5-title",
        { opacity: 0, y: 40, duration: 0.5, ease: "power2.out" }, 11.2);
      tl.from("#s5-sub",
        { opacity: 0, letterSpacing: "30px", duration: 0.5, ease: "power2.out" }, 11.5);
      tl.to(["#s5-bg","#s5-grid","#s5-icon","#s5-title","#s5-sub"],
        { opacity: 0, duration: 0.3 }, 12.7);

      // ─── SCENE 6: CTA ──────────────────────────────────────────
      tl.from("#s6-bg", { opacity: 0, duration: 0.3 }, 13);
      tl.from("#s6-title",
        { opacity: 0, y: -50, scale: 0.7, duration: 0.5, ease: "back.out(2)" }, 13);
      tl.from("#s6-button",
        { scale: 0, opacity: 0, duration: 0.6, ease: "back.out(2.5)" }, 13.3);
      tl.to("#s6-button",
        { scale: 1.1, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 13.9);
      tl.from("#s6-url",
        { opacity: 0, y: 30, duration: 0.5, ease: "power2.out" }, 13.6);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
